name: Actualización diaria del visor

on:
  schedule:
    # Minutos desplazados a propósito: las horas en punto están saturadas
    # en GitHub Actions y los crons pueden retrasarse o saltarse.
    # Cuatro pasadas al día que actúan de fallback entre sí: si una falla
    # (red caída, fuente no disponible), la siguiente la cubre.
    - cron: "23 7 * * *"    # 09:23 España — recoge los partidos de la noche
    - cron: "41 10 * * *"   # 12:41 — fallback de media mañana
    - cron: "17 14 * * *"   # 16:17 — fallback de tarde
    - cron: "53 20 * * *"   # 22:53 — última pasada del día
  workflow_dispatch: {}   # botón de ejecución manual

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar datos, modelo y simulación
        # Reintento ante fallos transitorios de red (descargas de datos)
        run: |
          python -m src.run_update || { echo "::warning::primer intento falló, reintento en 90s"; sleep 90; python -m src.run_update; }

      - name: Regenerar el visor
        run: python -m src.run_viewer

      - name: Publicar en la web
        run: |
          cp outputs/wc26_viewer.html docs/index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html \
                  outputs/wc26_stage_probabilities*.csv \
                  outputs/match_predictions_log.csv \
                  outputs/wc26_team_snapshots.csv \
                  data/processed/fotmob_xg.csv
          git commit -m "Actualización automática $(date -u +%F_%H:%M)" || echo "sin cambios que publicar"
          # autostash: el workspace queda sucio (datos regenerados que no
          # publicamos); se aparta solo durante el rebase
          git pull --rebase --autostash origin main
          git push
