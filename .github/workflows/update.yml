name: Actualización diaria del visor

on:
  schedule:
    # 07:00 y 13:00 UTC (09:00 y 15:00 en España). Los partidos en
    # Norteamérica acaban de madrugada; el dataset de resultados se
    # actualiza por la mañana europea.
    - cron: "0 7,13 * * *"
  workflow_dispatch: {}   # botón de ejecución manual

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar datos, modelo y simulación
        run: python -m src.run_update

      - name: Regenerar el visor
        run: python -m src.run_viewer

      - name: Publicar en la web
        run: |
          cp outputs/wc26_viewer.html docs/index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html \
                  outputs/wc26_stage_probabilities*.csv \
                  outputs/match_predictions_log.csv \
                  outputs/wc26_team_snapshots.csv \
                  data/processed/fotmob_xg.csv
          git commit -m "Actualización automática $(date -u +%F_%H:%M)" || echo "sin cambios que publicar"
          git pull --rebase origin main
          git push
